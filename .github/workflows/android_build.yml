name: Flutter Android Build & Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger of the build workflow from the Actions tab

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup JDK 17 (needed for Gradle and Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Highly stable OpenJDK distribution
          java-version: '17'
          cache: 'gradle'

      # 3. Setup Flutter action
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Inject Gemini API Key environment variable from GitHub Secrets into .env asset
      - name: Inject Environment Secrets
        run: |
          mkdir -p nutri_client
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > nutri_client/.env

      # 5. Download Flutter dependencies
      - name: Install dependencies
        run: |
          cd nutri_client
          flutter pub get

      # 6. Run Flutter Automated Verification Tests
      - name: Run Tests
        run: |
          cd nutri_client
          flutter test

      # 7. Build release APK
      - name: Build Release APK
        run: |
          cd nutri_client
          flutter build apk --release

      # 8. Upload compiled APK as a build artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutri-scan-android-apk
          path: nutri_client/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7 # Kept for 7 days in your GitHub dashboard
